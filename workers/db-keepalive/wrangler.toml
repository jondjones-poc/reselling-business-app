# Cloudflare Worker: scheduled fetch to your API /api/db-ping (keeps Supabase Postgres warm).
# Deploy: cd workers/db-keepalive && npx wrangler@3 deploy
# Secrets: npx wrangler@3 secret put DB_KEEPALIVE_SECRET   (must match server DB_KEEPALIVE_SECRET)
# Vars:   npx wrangler@3 secret put KEEPALIVE_URL   OR set [vars] below for non-secret URL only

name = "reselling-db-keepalive"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Twice weekly UTC — enough for Supabase ~7-day pause window; edit if you prefer daily.
[triggers]
crons = ["0 8 * * 1", "0 8 * * 4"]

# Public URL only (no secrets). Example:
# [vars]
# KEEPALIVE_URL = "https://your-api.example.com/api/db-ping"
