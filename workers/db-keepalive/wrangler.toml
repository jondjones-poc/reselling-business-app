# Cloudflare Worker: scheduled fetch to Render /api/db-keepalive (Postgres SELECT 1 via Supabase).
# Deploy: cd workers/db-keepalive && npx wrangler@3 deploy
# Secrets: npx wrangler@3 secret put DB_KEEPALIVE_SECRET   (must match Render DB_KEEPALIVE_SECRET)
# Vars:    KEEPALIVE_URL below (public Render URL)

name = "reselling-db-keepalive"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Free-tier schedule (Cloudflare Workers cron + Render 750 h/mo):
# - Every 14 min during 06:00–22:59 UTC (~510 Render instance-hours/mo, under 750 free cap)
# - Beats Render's ~15 min idle spin-down so the API stays warm while you're likely awake (UK/EU)
# - Hits Supabase many times daily (well inside the ~7-day free pause window)
[triggers]
crons = ["*/14 6-22 * * *"]

[vars]
KEEPALIVE_URL = "https://reselling-business-app.onrender.com/api/db-keepalive"
